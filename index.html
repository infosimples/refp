<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>refp examples</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 32rem),
        #0f172a;
    }

    .card {
      width: min(100%, 46rem);
      padding: 1.25rem;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0.35rem 0 1.25rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th,
    td {
      padding: 0.8rem 0;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      text-align: left;
    }

    th {
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>refp examples</h1>
    <p>Reverse Engineer Fingerprints Playground specimens.</p>

    <table>
      <thead>
        <tr>
          <th>Example</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><a href="./examples/00-navigator-useragent/">00-navigator-useragent</a></td>
          <td>Get navigator.userAgent</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
